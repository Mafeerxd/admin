<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>Panel de Meseros - MaferMex</title>
    <style>
        body { background-color: #000; color: white; font-family: 'Poppins', sans-serif; }
        .admin-container { padding: 40px 20px; }
        .table-reserva { 
            background-color: #111; 
            border-radius: 10px; 
            overflow: hidden;
            border: 1px solid #333;
        }
        .table-reserva thead { background-color: #d4af37; color: black; }
        .table-reserva td { vertical-align: middle; border-color: #222; color: #ccc; }
        .btn-reservacion { background-color: #d4af37; color: black; font-weight: 600; border: none; }
        .btn-reservacion:hover { background-color: #b38f2d; }
        
        /* Estilos para el Ticket Impreso */
        @media print {
            body * { visibility: hidden; }
            #ticket-imprimir, #ticket-imprimir * { visibility: visible; }
            #ticket-imprimir { position: absolute; left: 0; top: 0; width: 80mm; color: black !important; background: white !important; padding: 10px; }
            .btn-close, .btn-primary { display: none; }
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark bg-black border-bottom border-secondary">
        <div class="container">
            <a class="navbar-brand" href="#">
                <img src="items/logo.png" style="max-height: 40px;" class="me-2"> 
                PANEL DE CONTROL MESEROS
            </a>
            <div>
                <span id="user-badge" class="small me-3 text-secondary"></span>
                <button id="btn-logout" class="btn btn-outline-danger btn-sm">Cerrar Sesión</button>
            </div>
        </div>
    </nav>

    <div class="container admin-container">
        <div class="row mb-4">
            <div class="col-md-12">
                <h2 style="color: #d4af37;">Próximas Reservaciones</h2>
                <p class="text-secondary">Toma órdenes y genera tickets para tus clientes.</p>
            </div>
        </div>

        <div class="table-responsive table-reserva">
            <table class="table table-dark table-hover mb-0">
                <thead>
                    <tr>
                        <th>Fecha</th>
                        <th>Hora</th>
                        <th>Cliente</th>
                        <th>Pax</th>
                        <th>Notas</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="lista-reservaciones">
                    <tr><td colspan="6" class="text-center py-4">Cargando reservaciones...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="modal fade" id="modalOrden" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-dark text-white border-secondary">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title" style="color: #d4af37;">Generar Ticket de Consumo</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="ticket-imprimir">
                    <div class="text-center mb-3">
                        <h4 class="mb-0">MaferMex</h4>
                        <small class="text-secondary">Sabor Tradicional Mexicano</small>
                        <hr class="border-secondary">
                    </div>
                    <p><strong>Cliente:</strong> <span id="t-cliente"></span></p>
                    <div class="mb-3">
                        <label class="form-label small text-warning">Platillos / Bebidas:</label>
                        <textarea id="t-pedido" class="form-control bg-black text-white border-secondary" rows="4" placeholder="Ej: 3 Tacos al pastor, 1 Coca-Cola..."></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small text-warning">Total a Pagar ($):</label>
                        <input type="number" id="t-total" class="form-control bg-black text-white border-secondary" placeholder="0.00">
                    </div>
                    <div class="text-center mt-4 d-print-none">
                        <button type="button" class="btn btn-reservacion w-100" onclick="window.print()">
                            <i class="fas fa-print"></i> Imprimir Ticket
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

<script src="js/bootstrap.bundle.min.js"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, query, orderBy, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAo3jrNj8tE4f1rjtv1ac6baXwbadybpwA",
        authDomain: "mafermex-4f125.firebaseapp.com",
        projectId: "mafermex-4f125",
        storageBucket: "mafermex-4f125.firebasestorage.app",
        messagingSenderId: "140753612550",
        appId: "1:140753612550:web:33bd69a83caf10b8d5b887"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const listaContenedor = document.getElementById('lista-reservaciones');

    onAuthStateChanged(auth, (user) => {
        if (user && user.email === "maferx01x@gmail.com") {
            document.getElementById('user-badge').innerText = user.email;
            escucharReservas();
        } else {
            window.location.href = "loginadmin.html";
        }
    });

    function escucharReservas() {
        const q = query(collection(db, "reservaciones"), orderBy("timestamp", "desc"));
        onSnapshot(q, (snapshot) => {
            listaContenedor.innerHTML = "";
            if (snapshot.empty) {
                listaContenedor.innerHTML = `<tr><td colspan="6" class="text-center text-secondary py-4">No hay reservaciones hoy.</td></tr>`;
                return;
            }
            snapshot.forEach((docSnap) => {
                const data = docSnap.data();
                const id = docSnap.id;
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${data.fecha}</td>
                    <td><span class="badge border border-secondary">${data.hora}</span></td>
                    <td class="text-info">${data.email}</td>
                    <td class="text-center">${data.personas}</td>
                    <td class="small text-muted">${data.notas || "-"}</td>
                    <td>
                        <button class="btn btn-sm btn-outline-warning me-2" onclick="abrirOrden('${data.email}')">
                            <i class="fas fa-utensils"></i> Orden
                        </button>
                        <button class="btn btn-sm btn-outline-danger" onclick="borrarReserva('${id}')">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </td>
                `;
                listaContenedor.appendChild(tr);
            });
        });
    }

    window.abrirOrden = (clienteEmail) => {
        document.getElementById('t-cliente').innerText = clienteEmail;
        document.getElementById('t-pedido').value = "";
        document.getElementById('t-total').value = "";
        const myModal = new bootstrap.Modal(document.getElementById('modalOrden'));
        myModal.show();
    };

    window.borrarReserva = async (id) => {
        if (confirm("¿Eliminar esta reservación?")) {
            await deleteDoc(doc(db, "reservaciones", id));
        }
    };

    document.getElementById('btn-logout').addEventListener('click', () => {
        signOut(auth).then(() => window.location.href = "index.html");
    });
</script>
</body>
</html>
