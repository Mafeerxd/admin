<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>Panel de Meseros - MaferMex</title>
    <style>
        body { background-color: #000; color: white; font-family: 'Poppins', sans-serif; }
        .admin-container { padding: 40px 20px; }
        .table-reserva { background-color: #111; border-radius: 10px; border: 1px solid #333; overflow: hidden; }
        .table-reserva thead { background-color: #d4af37; color: black; }
        .btn-reservacion { background-color: #d4af37; color: black; font-weight: 600; border: none; }
        .btn-reservacion:hover { background-color: #b38f2d; color: white; }
        .item-orden { display: flex; justify-content: space-between; font-size: 0.9rem; margin-bottom: 5px; background: #222; padding: 8px; border-radius: 5px; }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark bg-black border-bottom border-secondary">
        <div class="container">
            <a class="navbar-brand" href="#">
                <img src="items/logo.png" style="max-height: 40px;" class="me-2"> 
                PANEL MESEROS MAFERMEX
            </a>
            <button id="btn-logout" class="btn btn-outline-danger btn-sm">Cerrar Sesión</button>
        </div>
    </nav>

    <div class="container admin-container">
        <h2 style="color: #d4af37;">Reservaciones Activas</h2>
        <div class="table-responsive table-reserva mt-4">
            <table class="table table-dark table-hover mb-0">
                <thead>
                    <tr>
                        <th>Hora</th>
                        <th>Cliente</th>
                        <th>Pax</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="lista-reservaciones">
                    <tr><td colspan="4" class="text-center py-4">Cargando...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="modal fade" id="modalOrden" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-dark text-white border-secondary">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title" style="color: #d4af37;">Comanda Digital</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p class="small text-secondary">ID Reserva: <span id="t-id" class="text-muted"></span></p>
                    <p class="small text-secondary">Cliente: <span id="t-cliente" class="text-info"></span></p>
                    
                    <div class="mb-3">
                        <label class="form-label small text-warning">WhatsApp del Cliente:</label>
                        <input type="tel" id="t-telefono" class="form-control bg-black text-white border-secondary" placeholder="Ej: 525512345678">
                    </div>

                    <div class="mb-3">
                        <label class="form-label small text-warning">Agregar Platillo:</label>
                        <select id="select-menu" class="form-select bg-black text-white border-secondary">
                            <option value="">-- Seleccionar --</option>
                            <option value="85">Tacos al Pastor - $85</option>
                            <option value="85">Tacos Dorados - $85</option>
                            <option value="120">Tamales - $120</option>
                            <option value="120">Enchiladas Verdes - $120</option>
                            <option value="95">Chilaquiles Verdes - $95</option>
                            <option value="95">Guacamole - $95</option>
                            <option value="95">Chiles en Nogada - $95</option>
                            <option value="95">Mole Poblano - $95</option>
                            <option value="95">Pozole - $95</option>
                            <option value="95">Sopes - $95</option>
                            <option value="95">Ponche - $95</option>
                            <option value="95">Pulque - $95</option>
                            <option value="95">Rompope - $95</option>
                            <option value="95">Agua de Horchata - $95</option>
                            <option value="95">Aguas de Sabores - $95</option>
                        </select>
                        <button class="btn btn-reservacion w-100 mt-2" onclick="agregarPlatillo()">+ Agregar</button>
                    </div>

                    <div id="lista-orden-items" class="mt-3"></div>

                    <div class="d-flex justify-content-between mt-3 border-top border-secondary pt-2">
                        <h4 class="text-warning">TOTAL:</h4>
                        <h4 id="total-cuenta">$0.00</h4>
                    </div>

                    <button class="btn btn-success w-100 mt-4" onclick="enviarWhatsApp()">
                        <i class="fab fa-whatsapp"></i> Enviar Ticket y Finalizar
                    </button>
                </div>
            </div>
        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, query, orderBy, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAo3jrNj8tE4f1rjtv1ac6baXwbadybpwA",
        authDomain: "mafermex-4f125.firebaseapp.com",
        projectId: "mafermex-4f125",
        storageBucket: "mafermex-4f125.firebasestorage.app",
        messagingSenderId: "140753612550",
        appId: "1:140753612550:web:33bd69a83caf10b8d5b887"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    
    let totalGlobal = 0;
    let textoResumen = "";
    let currentModal;

    onAuthStateChanged(auth, (user) => {
        if (user && user.email === "maferx01x@gmail.com") escucharReservas();
        else window.location.href = "loginadmin.html";
    });

    function escucharReservas() {
        const q = query(collection(db, "reservaciones"), orderBy("timestamp", "desc"));
        onSnapshot(q, (snapshot) => {
            const tbody = document.getElementById('lista-reservaciones');
            tbody.innerHTML = "";
            snapshot.forEach((docSnap) => {
                const data = docSnap.data();
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${data.hora}</td>
                    <td class="text-info">${data.email}</td>
                    <td>${data.personas}</td>
                    <td>
                        <button class="btn btn-sm btn-outline-warning me-2" onclick="abrirOrden('${docSnap.id}', '${data.email}')">Atender</button>
                        <button class="btn btn-sm btn-outline-danger" onclick="borrarReserva('${docSnap.id}')">X</button>
                    </td>`;
                tbody.appendChild(tr);
            });
        });
    }

    window.abrirOrden = (id, email) => {
        document.getElementById('t-id').innerText = id;
        document.getElementById('t-cliente').innerText = email;
        document.getElementById('t-telefono').value = ""; 
        limpiarOrden();
        currentModal = new bootstrap.Modal(document.getElementById('modalOrden'));
        currentModal.show();
    };

    window.agregarPlatillo = () => {
        const select = document.getElementById('select-menu');
        const precio = parseFloat(select.value);
        const nombre = select.options[select.selectedIndex].text.split(' - ')[0];
        if (isNaN(precio)) return;

        const contenedor = document.getElementById('lista-orden-items');
        contenedor.innerHTML += `<div class="item-orden"><span>${nombre}</span> <strong>$${precio}</strong></div>`;

        totalGlobal += precio;
        textoResumen += `• ${nombre} ($${precio})\n`;
        document.getElementById('total-cuenta').innerText = `$${totalGlobal.toFixed(2)}`;
    };

    window.enviarWhatsApp = async () => {
        const tel = document.getElementById('t-telefono').value.trim();
        const idReserva = document.getElementById('t-id').innerText;
        
        if (!tel || totalGlobal === 0) return alert("Falta el teléfono o platillos.");

        let msj = `*🇲🇽 TICKET MAFERMEX*\n\n`;
        msj += `*Cliente:* ${document.getElementById('t-cliente').innerText}\n`;
        msj += `*Orden:*\n${textoResumen}\n`;
        msj += `*TOTAL: $${totalGlobal.toFixed(2)}*\n\n`;
        msj += `¡Gracias por tu visita! ✨`;

        // 1. Abrir WhatsApp
        window.open(`https://wa.me/${tel}?text=${encodeURIComponent(msj)}`, '_blank');

        // 2. Borrar de Firebase automáticamente
        try {
            await deleteDoc(doc(db, "reservaciones", idReserva));
            currentModal.hide(); // Cerrar el modal
        } catch (error) {
            console.error("Error al borrar:", error);
        }
    };

    window.limpiarOrden = () => {
        totalGlobal = 0; textoResumen = "";
        document.getElementById('lista-orden-items').innerHTML = "";
        document.getElementById('total-cuenta').innerText = "$0.00";
    };

    window.borrarReserva = async (id) => {
        if (confirm("¿Eliminar reservación?")) await deleteDoc(doc(db, "reservaciones", id));
    };

    document.getElementById('btn-logout').onclick = () => signOut(auth).then(() => window.location.href = "index.html");
</script>
</body>
    <script src="js/bootstrap.bundle.js"></script>
</html>
