<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>Panel de Meseros - MaferMex</title>
    <style>
        body { background-color: #000; color: white; font-family: 'Poppins', sans-serif; }
        .admin-container { padding: 40px 20px; }
        .table-reserva { 
            background-color: #111; 
            border-radius: 10px; 
            overflow: hidden;
            border: 1px solid #333;
        }
        .table-reserva thead { background-color: #d4af37; color: black; }
        .table-reserva td { vertical-align: middle; border-color: #222; color: #ccc; }
        .btn-reservacion { background-color: #d4af37; color: black; font-weight: 600; border: none; }
        .btn-reservacion:hover { background-color: #b38f2d; color: white; }
        
        /* Estilos Lista de Orden */
        #lista-orden-items { border-top: 1px dashed #444; padding-top: 10px; margin-top: 10px; }
        .item-orden { display: flex; justify-content: space-between; font-size: 0.9rem; margin-bottom: 5px; background: #000; padding: 5px 10px; border-radius: 5px; }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark bg-black border-bottom border-secondary">
        <div class="container">
            <a class="navbar-brand" href="#">
                <img src="items/logo.png" style="max-height: 40px;" class="me-2"> 
                PANEL MESEROS MAFERMEX
            </a>
            <div>
                <span id="user-badge" class="small me-3 text-secondary"></span>
                <button id="btn-logout" class="btn btn-outline-danger btn-sm">Cerrar Sesión</button>
            </div>
        </div>
    </nav>

    <div class="container admin-container">
        <div class="row mb-4">
            <div class="col-md-12">
                <h2 style="color: #d4af37;">Reservaciones de Hoy</h2>
                <p class="text-secondary">Selecciona una mesa para tomar la orden.</p>
            </div>
        </div>

        <div class="table-responsive table-reserva">
            <table class="table table-dark table-hover mb-0">
                <thead>
                    <tr>
                        <th>Hora</th>
                        <th>Cliente</th>
                        <th>Pax</th>
                        <th>Notas</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="lista-reservaciones">
                    <tr><td colspan="5" class="text-center py-4">Cargando...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="modal fade" id="modalOrden" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-dark text-white border-secondary">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title" style="color: #d4af37;">Comanda Digital</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p><strong>Atendiendo a:</strong> <span id="t-cliente" class="text-info"></span></p>
                    
                    <div class="mb-3">
                        <label class="form-label small text-warning">Selecciona Platillo:</label>
                        <select id="select-menu" class="form-select bg-black text-white border-secondary">
                            <option value="">-- Menú MaferMex --</option>
                            <option value="85">Tacos al Pastor - $85</option>
                            <option value="85">Tacos Dorados - $85</option>
                            <option value="120">Tamales - $120</option>
                            <option value="120">Enchiladas Verdes - $120</option>
                            <option value="95">Chilaquiles Verdes - $95</option>
                            <option value="95">Guacamole - $95</option>
                            <option value="95">Chiles en Nogada - $95</option>
                            <option value="95">Mole Poblano - $95</option>
                            <option value="95">Pozole - $95</option>
                            <option value="95">Sopes - $95</option>
                            <option value="95">Ponche - $95</option>
                            <option value="95">Pulque - $95</option>
                            <option value="95">Rompope - $95</option>
                            <option value="95">Agua de Horchata - $95</option>
                            <option value="95">Aguas de Sabores - $95</option>
                        </select>
                        <button class="btn btn-reservacion w-100 mt-2" onclick="agregarPlatillo()">Agregar a la cuenta</button>
                    </div>

                    <div id="lista-orden-items">
                        </div>

                    <div class="d-flex justify-content-between mt-3 border-top border-secondary pt-2">
                        <h4 class="text-warning">TOTAL:</h4>
                        <h4 id="total-cuenta">$0.00</h4>
                    </div>

                    <button class="btn btn-success w-100 mt-4 py-2" onclick="enviarWhatsApp()">
                        <i class="fab fa-whatsapp"></i> Enviar Ticket por WhatsApp
                    </button>
                    <button class="btn btn-link text-secondary btn-sm w-100 mt-2" onclick="limpiarOrden()">Borrar todo</button>
                </div>
            </div>
        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, query, orderBy, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAo3jrNj8tE4f1rjtv1ac6baXwbadybpwA",
        authDomain: "mafermex-4f125.firebaseapp.com",
        projectId: "mafermex-4f125",
        storageBucket: "mafermex-4f125.firebasestorage.app",
        messagingSenderId: "140753612550",
        appId: "1:140753612550:web:33bd69a83caf10b8d5b887"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    
    let totalGlobal = 0;
    let textoResumen = "";

    onAuthStateChanged(auth, (user) => {
        if (user && user.email === "maferx01x@gmail.com") {
            document.getElementById('user-badge').innerText = user.email;
            escucharReservas();
        } else {
            window.location.href = "loginadmin.html";
        }
    });

    function escucharReservas() {
        const q = query(collection(db, "reservaciones"), orderBy("timestamp", "desc"));
        onSnapshot(q, (snapshot) => {
            const tbody = document.getElementById('lista-reservaciones');
            tbody.innerHTML = "";
            if (snapshot.empty) {
                tbody.innerHTML = `<tr><td colspan="5" class="text-center text-secondary py-4">No hay clientes en lista.</td></tr>`;
                return;
            }
            snapshot.forEach((docSnap) => {
                const data = docSnap.data();
                const id = docSnap.id;
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><span class="badge border border-secondary">${data.hora}</span></td>
                    <td class="text-info">${data.email}</td>
                    <td class="text-center">${data.personas}</td>
                    <td class="small text-muted">${data.notas || "-"}</td>
                    <td>
                        <button class="btn btn-sm btn-outline-warning me-2" onclick="abrirOrden('${data.email}')">
                            <i class="fas fa-utensils"></i> Orden
                        </button>
                        <button class="btn btn-sm btn-outline-danger" onclick="borrarReserva('${id}')">
                            <i class="fas fa-check"></i> Atendido
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        });
    }

    window.abrirOrden = (email) => {
        document.getElementById('t-cliente').innerText = email;
        limpiarOrden();
        const modal = new bootstrap.Modal(document.getElementById('modalOrden'));
        modal.show();
    };

    window.agregarPlatillo = () => {
        const select = document.getElementById('select-menu');
        const precio = parseFloat(select.value);
        const nombre = select.options[select.selectedIndex].text.split(' - ')[0];

        if (isNaN(precio)) return;

        const contenedor = document.getElementById('lista-orden-items');
        const item = document.createElement('div');
        item.className = 'item-orden';
        item.innerHTML = `<span>${nombre}</span> <strong>$${precio}</strong>`;
        contenedor.appendChild(item);

        totalGlobal += precio;
        textoResumen += `• ${nombre} ($${precio})\n`;
        document.getElementById('total-cuenta').innerText = `$${totalGlobal.toFixed(2)}`;
    };

    window.enviarWhatsApp = () => {
        if (totalGlobal === 0) return alert("Agrega al menos un platillo.");

        const cliente = document.getElementById('t-cliente').innerText;
        let mensaje = `*🇲🇽 TICKET DIGITAL MAFERMEX*\n`;
        mensaje += `_Atención personalizada_\n\n`;
        mensaje += `*Cliente:* ${cliente}\n`;
        mensaje += `*Detalle:*\n${textoResumen}\n`;
        mensaje += `*TOTAL A PAGAR: $${totalGlobal.toFixed(2)}*\n\n`;
        mensaje += `¡Gracias por visitarnos! 🌮✨`;

        window.open(`https://wa.me/?text=${encodeURIComponent(mensaje)}`, '_blank');
    };

    window.limpiarOrden = () => {
        totalGlobal = 0;
        textoResumen = "";
        document.getElementById('lista-orden-items').innerHTML = "";
        document.getElementById('total-cuenta').innerText = "$0.00";
    };

    window.borrarReserva = async (id) => {
        if (confirm("¿Marcar cliente como atendido y quitar de la lista?")) {
            await deleteDoc(doc(db, "reservaciones", id));
        }
    };

    document.getElementById('btn-logout').addEventListener('click', () => {
        signOut(auth).then(() => window.location.href = "index.html");
    });
</script>
</body>
</html>
